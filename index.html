<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đỗ Trung Kiên - Link Bio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .name {
            font-size: 2.2em;
            color: white;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .description {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn i {
            font-size: 1.3em;
        }

        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .floating-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                margin: 10px;
            }

            .name {
                font-size: 1.8em;
            }

            .btn {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="name">Đỗ Trung Kiên</h1>
        <p class="description">Chào mừng bạn đến với trang cá nhân của tôi!</p>
        <div class="buttons">
            <a href="https://www.facebook.com/otrunggkien" class="btn" target="_blank">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            <a href="https://tiktok.com/@_trugkien_" class="btn" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://zalo.me/0387999288" class="btn" target="_blank">
                <i class="fab fa-whatsapp"></i> Zalo <!-- Sử dụng icon tương tự vì Zalo không có icon chuẩn -->
            </a>
            <a href="https://t.me/trggkien12" class="btn" target="_blank">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://www.instagram.com/twk.ine24/" class="btn" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>
    </div>

    <div class="floating-btn" onclick="openPortfolio()">
        <i class="fas fa-play"></i>
    </div>

    <script>
        function openPortfolio() {
            // Thay bằng link video hoặc portfolio thực tế
            window.open('https://yourportfolio.com', '_blank');
        }
    </script>
</body>
</html>
